services:
  zgadmin:
    image: docker.cnb.cool/pylover/tools/zgadmin
    container_name: zgadmin-app
    ports:
      - "7000:80"
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      # CORS 允许的域名（生产环境必须配置，不可为 *）
      - BACKEND_CORS_ORIGINS=https://your-domain.com,https://admin.your-domain.com
      - SECRET_KEY=changethisxxxxxx
      - DB_SCHEME=postgresql
      - DB_SERVER=postgres
      - DB_PORT=5432
      - DB_PATH=zgadmin
      - DB_USER=zgadmin
      - DB_PASSWORD=changethisxxxxxx
    volumes:
      - zgadmin_data:/backend/static
    depends_on:
      postgres:
        condition: service_healthy
        required: true
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost/api/v1/base/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: zgadmin-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=zgadmin
      - POSTGRES_PASSWORD=changethisxxxxxx
      - POSTGRES_DB=zgadmin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zgadmin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zgadmin-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  zgadmin_data:
  pgdata:
  redisdata:
