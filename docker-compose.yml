services:
  zgadmin:
    image: docker.cnb.cool/pylover/tools/zgadmin
    container_name: zgadmin-app
    ports:
      - "7000:80"
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      # 数据库：默认 SQLite（零配置启动），取消注释切换 PostgreSQL
      - DB_SCHEME=sqlite
      # - DB_SCHEME=postgresql
      # - DB_SERVER=postgres
      # - DB_PORT=5432
      # - DB_PATH=zgadmin
      # - DB_USER=zgadmin
      # - DB_PASSWORD=changethis
    volumes:
      - zgadmin_data:/backend/static
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost/api/v1/base/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: zgadmin-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=zgadmin
      - POSTGRES_PASSWORD=changethis
      - POSTGRES_DB=zgadmin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zgadmin"]
      interval: 10s
      timeout: 5s
      retries: 5
    # PostgreSQL 默认不启动，取消下行注释以启用
    profiles:
      - postgres

volumes:
  zgadmin_data:
  pgdata:
